<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container" id="mainContainer">
        <div class="conteiner" id="gallery">
            <img src="" id="mainImage" alt="image">
        </div>
    </div>

    <div class="container">
        <span id="count"></span>
    </div>

    <div class="container" id="controller">
        <button class="btn btn-primary" id="leftBut">⏪</button>
        <button class="btn btn-warning" id="selectBut">Выбрать</button>
        <button class="btn btn-success" id="startBut" style="display:none;">Играть</button>
        <button class="btn btn-primary" id="rightBut">⏩</button>
    </div>

    <div class="canvasContainer" id="canvas-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="config.js"></script>
    <script src="./entities/Hero.js"></script>
    <script src="game.js"></script>
    <script src="script.js"></script>
</body>
</html>
